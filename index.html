<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ameer Wolf | Pro Media Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: #0a0a0a;
    color: #ffffff;
    font-family: 'Tajawal', 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at top, #1a0000 0%, #0a0a0a 60%);
}

.container {
    max-width: 820px;
    width: 100%;
    text-align: center;
}

/* Header */
.logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
}

.logo-line::before,
.logo-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to center, transparent, #ff0000);
}

h1 {
    color: #ff0000;
    font-size: 3.2rem;
    font-weight: 900;
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(255,0,0,0.6), 0 0 60px rgba(255,0,0,0.2);
    animation: flicker 4s infinite;
}

@keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
}

.version-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff0000, #990000);
    padding: 5px 18px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 18px;
    box-shadow: 0 0 15px rgba(255,0,0,0.4);
}

.description {
    color: #aaa;
    font-size: 1.15rem;
    margin: 0 auto 30px;
    max-width: 550px;
    line-height: 1.8;
}

/* Main image */
.app-image {
    width: 100%;
    max-width: 720px;
    border: 1px solid #330000;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(255,0,0,0.25), 0 20px 60px rgba(0,0,0,0.8);
    margin-bottom: 30px;
    transition: transform 0.3s;
}

.app-image:hover {
    transform: scale(1.01);
}

/* Screenshots gallery */
.screenshots {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 35px;
    flex-wrap: wrap;
}

.screenshots img {
    width: 31%;
    min-width: 180px;
    border-radius: 10px;
    border: 1px solid #2a0000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.6);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.screenshots img:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 10px 30px rgba(255,0,0,0.3);
}

/* Buttons */
.button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.btn-custom {
    padding: 13px 32px;
    border-radius: 50px;
    font-weight: 700;
    text-decoration: none;
    color: #ffffff;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Tajawal', sans-serif;
}

.btn-download {
    background: linear-gradient(135deg, #ff0000, #cc0000);
    box-shadow: 0 4px 20px rgba(255,0,0,0.4);
    animation: pulse-red 2.5s infinite;
}

.btn-download:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 30px rgba(255,0,0,0.6);
}

@keyframes pulse-red {
    0%, 100% { box-shadow: 0 4px 20px rgba(255,0,0,0.4); }
    50% { box-shadow: 0 4px 35px rgba(255,0,0,0.7); }
}

.btn-buy {
    background: linear-gradient(135deg, #1a7a1a, #0d5c0d);
    box-shadow: 0 4px 15px rgba(0,200,0,0.25);
}

.btn-buy:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 25px rgba(0,200,0,0.4);
}

.btn-facebook {
    background: linear-gradient(135deg, #1877F2, #1255b5);
    box-shadow: 0 4px 15px rgba(24,119,242,0.3);
}

.btn-facebook:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #1565c0, #0e3f8a);
}

/* Divider */
.divider {
    width: 60px;
    height: 2px;
    background: #ff0000;
    margin: 30px auto;
    border-radius: 2px;
    opacity: 0.5;
}
</style>
</head>
<body>

    <img src="AmeerWolf_Pro_Setup_v2.2.jpg" class="app-image" alt="AmeerWolf Pro Preview">

    <div class="screenshots">
        <img src="AR.jpg" alt="واجهة عربية">
        <img src="AmeerWolf_Pro_Setup_v2.2.jpg" alt="البرنامج">
        <img src="EN.jpg" alt="English Interface">
    </div>

    <div class="button-group">
        <a href="https://github.com/ameerwolfpromediaorganizer-gif/AmeerWolf-Pro-Media-Organizer-v2.2/releases/download/v2.2/AmeerWolf_Pro_Setup_v2.2.zip" class="btn-custom btn-download">
            ⬇️ 💡 🎁 فترة تجريبية مجانية لمدة 24 ساعة بدون أي التزام!
        </a>
        <a href="https://payhip.com/b/RQBk7" class="btn-custom btn-buy">
            🛒 اشترِ النسخة الكاملة (29.99$)
        </a>
        <a href="https://www.facebook.com/share/1C4ctWAGJS/?mibextid=wwXIfr" class="btn-custom btn-facebook">
            👍 تابعنا على فيسبوك
        </a>
    </div>

    <div class="divider"></div>

</div>
</body>
</html>
